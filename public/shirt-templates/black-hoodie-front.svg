<svg viewBox="0 0 400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="hoodieGradientBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A2A2A"/>
      <stop offset="50%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#151515"/>
    </linearGradient>
    <filter id="hoodieShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Hood -->
  <ellipse cx="200" cy="55" rx="85" ry="35" fill="#252525" stroke="#333" stroke-width="1"/>
  <!-- Hoodie body -->
  <path d="M70 85 L30 150 L80 165 L80 470 L320 470 L320 165 L370 150 L330 85 L280 85 L260 110 Q200 135 140 110 L120 85 Z" 
        fill="url(#hoodieGradientBlack)" 
        stroke="#333333" 
        stroke-width="1.5"
        filter="url(#hoodieShadow)"/>
  <!-- Hood opening/collar -->
  <path d="M140 110 Q200 135 260 110 L255 130 Q200 155 145 130 Z" 
        fill="#222222" 
        stroke="#333333" 
        stroke-width="1"/>
  <!-- Front pocket -->
  <path d="M130 350 L130 410 Q200 430 270 410 L270 350 Q200 370 130 350" 
        fill="none" 
        stroke="rgba(255,255,255,0.08)" 
        stroke-width="1.5"/>
  <!-- Drawstrings -->
  <path d="M170 130 L170 200" stroke="#444" stroke-width="2" stroke-linecap="round"/>
  <path d="M230 130 L230 200" stroke="#444" stroke-width="2" stroke-linecap="round"/>
</svg>
