<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shirtGradientNavy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2A4365"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#1A3050"/>
    </linearGradient>
    <filter id="shirtShadowNavy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Shirt body -->
  <path d="M80 80 L50 130 L90 140 L90 450 L310 450 L310 140 L350 130 L320 80 L260 80 L240 100 Q200 120 160 100 L140 80 Z" 
        fill="url(#shirtGradientNavy)" 
        stroke="#2A4060" 
        stroke-width="1.5"
        filter="url(#shirtShadowNavy)"/>
  <!-- Collar -->
  <path d="M160 80 L140 80 L160 100 Q200 120 240 100 L260 80 L240 80 Q200 100 160 80" 
        fill="#1A3555" 
        stroke="#2A4060" 
        stroke-width="1"/>
  <!-- Sleeve shadows -->
  <path d="M50 130 L90 140 L88 148 L48 138 Z" fill="rgba(0,0,0,0.1)"/>
  <path d="M350 130 L310 140 L312 148 L352 138 Z" fill="rgba(0,0,0,0.1)"/>
</svg>
