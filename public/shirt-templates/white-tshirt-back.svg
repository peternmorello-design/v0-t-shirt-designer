<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shirtGradientWhiteBack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F8F8F8"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    <filter id="shirtShadowWhiteBack" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Shirt body (back - no collar dip) -->
  <path d="M80 80 L50 130 L90 140 L90 450 L310 450 L310 140 L350 130 L320 80 L260 80 Q200 95 140 80 Z" 
        fill="url(#shirtGradientWhiteBack)" 
        stroke="#E0E0E0" 
        stroke-width="1.5"
        filter="url(#shirtShadowWhiteBack)"/>
  <!-- Back collar line -->
  <path d="M140 80 Q200 95 260 80" 
        fill="none" 
        stroke="#E5E5E5" 
        stroke-width="1.5"/>
  <!-- Sleeve shadows -->
  <path d="M50 130 L90 140 L88 148 L48 138 Z" fill="rgba(0,0,0,0.03)"/>
  <path d="M350 130 L310 140 L312 148 L352 138 Z" fill="rgba(0,0,0,0.03)"/>
  <!-- Center seam -->
  <path d="M200 95 L200 440" stroke="rgba(0,0,0,0.02)" stroke-width="1"/>
</svg>
