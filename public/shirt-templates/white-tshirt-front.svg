<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shirtGradientWhite" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="50%" style="stop-color:#F8F8F8"/>
      <stop offset="100%" style="stop-color:#F0F0F0"/>
    </linearGradient>
    <filter id="shirtShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  <!-- Shirt body -->
  <path d="M80 80 L50 130 L90 140 L90 450 L310 450 L310 140 L350 130 L320 80 L260 80 L240 100 Q200 120 160 100 L140 80 Z" 
        fill="url(#shirtGradientWhite)" 
        stroke="#E0E0E0" 
        stroke-width="1.5"
        filter="url(#shirtShadow)"/>
  <!-- Collar -->
  <path d="M160 80 L140 80 L160 100 Q200 120 240 100 L260 80 L240 80 Q200 100 160 80" 
        fill="#F5F5F5" 
        stroke="#E5E5E5" 
        stroke-width="1"/>
  <!-- Sleeve shadows -->
  <path d="M50 130 L90 140 L88 148 L48 138 Z" fill="rgba(0,0,0,0.03)"/>
  <path d="M350 130 L310 140 L312 148 L352 138 Z" fill="rgba(0,0,0,0.03)"/>
  <!-- Body fold lines -->
  <path d="M200 120 L200 440" stroke="rgba(0,0,0,0.02)" stroke-width="1"/>
</svg>
