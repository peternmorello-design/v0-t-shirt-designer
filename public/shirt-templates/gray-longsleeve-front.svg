<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shirtGradientGray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#808080"/>
      <stop offset="50%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#5A5A5A"/>
    </linearGradient>
    <filter id="shirtShadowGray" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Left long sleeve -->
  <path d="M50 130 L10 380 L50 390 L90 145" 
        fill="url(#shirtGradientGray)" 
        stroke="#707070" 
        stroke-width="1"/>
  <!-- Right long sleeve -->
  <path d="M350 130 L390 380 L350 390 L310 145" 
        fill="url(#shirtGradientGray)" 
        stroke="#707070" 
        stroke-width="1"/>
  <!-- Shirt body -->
  <path d="M80 80 L50 130 L90 140 L90 450 L310 450 L310 140 L350 130 L320 80 L260 80 L240 100 Q200 120 160 100 L140 80 Z" 
        fill="url(#shirtGradientGray)" 
        stroke="#707070" 
        stroke-width="1.5"
        filter="url(#shirtShadowGray)"/>
  <!-- Collar -->
  <path d="M160 80 L140 80 L160 100 Q200 120 240 100 L260 80 L240 80 Q200 100 160 80" 
        fill="#5A5A5A" 
        stroke="#606060" 
        stroke-width="1"/>
  <!-- Cuff details -->
  <rect x="10" y="375" width="40" height="15" fill="#555" rx="2"/>
  <rect x="350" y="375" width="40" height="15" fill="#555" rx="2"/>
</svg>
